team.bio.hugo-alliaume: |-
    Développeur full-stack depuis 2009, Hugo aime apprendre énormément de nouvelles choses, ce qui le rend très polyvalent. Il s'est depuis spécialisé dans le développement web, principalement avec PHP et JavaScript, mais aussi dans l'optimisation des performances côté back-end et côté navigateur.

    Hugo a récemment rejoint la Core Team de Symfony UX. Fan d'open source depuis les tout débuts, il y contribue aussi bien à travers ses propres projets qu'en travaillant sur Symfony, plus précisément sur Webpack Encore et Symfony UX.

    Fin gourmet, vous le trouverez sans doute près des buffets des conférences.
team.bio.felix-eymonot: |-
    Félix est un développeur PHP spécialisé en Symfony depuis 2017, certifié « Advanced » en version 6. Fort d'une expérience en agence dans de multiples secteurs, il construit des solutions robustes et évolutives, taillées pour les besoins métier.

    Passionné par Symfony et l'open source, il contribue activement à la communauté et a même donné une conférence technique.

    Quand il ne conçoit pas du code propre et maintenable, il est attiré par l'univers de DC Comics, en particulier Nightwing, car que ce soit dans la tech ou à Gotham, l'agilité, l'intégrité et un fort sens de la justice font toujours la différence 🦇
team.bio.florian-merle: |-
    Florian est passionné d'informatique depuis toujours et a transformé cette passion en carrière de développeur web. Depuis 2017, il se spécialise en PHP et Symfony. En 2019, il a découvert Sylius et construit depuis des solutions e-commerce avec, devenant l'un de ses Key Contributors.

    Grâce au mentorat de Mathias, Florian a donné sa première conférence à l'AFUP Day Lyon en 2023. Depuis, il est devenu un membre actif de l'AFUP Lyon, où il organise des événements et aide les nouveaux venus à découvrir l'écosystème PHP et sa communauté.

    Quand il ne code pas, Florian aime prendre la route à moto pour découvrir de nouveaux endroits et paysages.
team.bio.jeremy-romey: |-
    Jérémy est un développeur Symfony certifié. Il contribue au code de Symfony et à son écosystème tout en participant aux événements de la communauté.

    Il aide les développeurs PHP et Symfony à construire des applications de grande qualité. Son objectif : aider les équipes à améliorer leur façon de travailler et à gagner en confiance dans le code qu'elles produisent.

    Il ne dit jamais non à un bon espresso ☕
team.bio.jules-pietri: |-
    Passionné de PHP et d'open source depuis plus de dix ans, Jules est devenu formateur, évangéliste et consultant avisé, amateur de défis techniques.

    Et pour une bio, c'est largement suffisant.

    Santé 🍺🍀
team.bio.mathias-arlaud: |-
    Conférencier, consultant, lead developer et formateur PHP/Symfony, Mathias a travaillé deux ans avec le créateur de Symfony et deux ans avec le créateur d'API Platform, Mercure et FrankenPHP.

    Enthousiaste de l'open source, il contribue largement au framework Symfony et à son écosystème, en se concentrant notamment sur le système de sérialisation des données. Spécialisé dans le développement d'API, il met son expertise au service de solutions rapides, robustes et maintenables.

    Ne demandez pas pourquoi, mais à la question PHPStorm vs VsCode, il répond encore VIM.
team.bio.robin-chalas: |-
    Robin est Software Architect & mainteneur open source, impliqué dans l'écosystème PHP/Symfony depuis plus de dix ans, CEO et consultant @baksla.sh.

    Membre de la Core Team Symfony, il contribue au framework en corrigeant des bugs et des failles de sécurité, mais aussi en apportant de nouvelles fonctionnalités à son cœur, en améliorant continuellement sa conception et en aidant la communauté à contribuer à Symfony et aux autres paquets populaires qu'il maintient.

    En tant que consultant, il aime orienter les équipes techniques de toute taille dans la bonne direction, fort de son expérience dans la conception de grands systèmes logiciels.

    Il adore aussi aider et partager ses connaissances en participant aux plateformes d'entraide, en relisant des contributions et en intervenant dans des conférences techniques.

    Loin du clavier, Robin caresse ses chats ou joue à la pétanque.
team.bio.valmont-pehaut-pietri: |-
    Valmont est un développeur PHP/Symfony qui adore plonger dans les gros projets en plein chaos quand tout brûle, que ce soit pour livrer une fonctionnalité, démêler du code legacy ou aider une migration à enfin avancer.

    Après 10 ans dans la vente, il s'est reconverti dans le développement web et a gardé une approche pragmatique, centrée sur l'humain, pour résoudre les problèmes.

    Il se concentre surtout sur le développement back-end, l'architecture propre et le code que les futurs développeurs ne maudiront pas trop fort.

    Il donne aussi des conférences (quand les astres s'alignent et qu'il est d'humeur), contribue à l'open source et continue de creuser les design patterns, l'architecture logicielle et l'écosystème Symfony.

    Grand fan de jeux de cartes à collectionner, on le croise souvent en conférence où, plutôt que de se joindre aux verres d'after-work habituels, il s'entraîne avec son ami Jérémy. Bien sûr, il est toujours partant pour les deux ! C'est aussi un amateur de bière artisanale, mais attention : si vous abordez le sujet, la conversation peut devenir aussi intense qu'un débat politique.
team.bio.yazid-hassani: |-
    Yazid est un développeur frontend spécialisé en React et Vue depuis 2019. Très attaché à la performance et à l'expérience utilisateur, il façonne des interfaces élégantes et réactives, fluides et intuitives.

    Passionné par les technologies web modernes, il explore sans cesse de nouvelles approches pour affiner ses compétences et garder une longueur d'avance dans un paysage frontend en perpétuelle évolution.

    Toujours en quête d'innovation, il s'épanouit en relevant des défis complexes, en optimisant les interfaces et en transformant les idées en expériences interactives.

    Quand il ne peaufine pas son code, vous pourriez le surprendre à perfectionner sa technique d'infusion du café, car un bon code, comme un bon café, est une affaire de précision et d'équilibre. ☕🚀
