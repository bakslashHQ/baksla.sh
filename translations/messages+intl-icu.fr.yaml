home.products.service.custom_symfony_development.title: Développement
home.products.service.custom_symfony_development.summary: "Projets greenfield et refontes profondes, pensés autour de votre métier, pas autour des réglages par défaut d'un framework. Nous concevons les bounded contexts avant de générer la moindre entité, et nous consignons les décisions d'architecture dans des ADR qui survivent à la mission."
home.products.service.custom_symfony_development.detail: "Des boucles de feedback courtes, de la CI dès le premier jour, et du code qui se lit comme de la documentation. Quand nous partons, votre équipe possède chaque ligne : pas de vendor lock-in, pas de couches mystérieuses, pas de dépendance à « demander à l'agence »."
home.products.service.custom_symfony_development.bullet_1: DDD & architecture hexagonale
home.products.service.custom_symfony_development.bullet_2: API Platform & API headless
home.products.service.custom_symfony_development.bullet_3: Workers asynchrones & Messenger

home.products.service.cto_as_a_service.title: CTO à la demande
home.products.service.cto_as_a_service.summary: "Un jugement technique senior, sans embauche à plein temps. Roadmaps, processus de recrutement, choix de prestataires, et les conversations délicates qui garantissent une livraison honnête."
home.products.service.cto_as_a_service.detail: "Conçu pour les fondateurs qui ont besoin d'une voix technique autour de la table, pas d'un poste de plus à pourvoir définitivement. Nous nous intégrons à votre direction chaque semaine, ajustons notre implication selon les besoins du produit, et transmettons la méthode pour que vous puissiez recruter notre remplaçant le moment venu."
home.products.service.cto_as_a_service.bullet_1: Roadmap & priorisation
home.products.service.cto_as_a_service.bullet_2: Recrutement & organisation d'équipe
home.products.service.cto_as_a_service.bullet_3: Décisions make-or-buy

home.products.service.architecture.title: "Étude & audit d'architecture"
home.products.service.architecture.summary: "Nous commençons par comprendre votre métier, ses règles, ses contraintes, sa trajectoire de croissance, et l'équipe qui le portera."
home.products.service.architecture.detail: "Chacune de nos recommandations tient compte de la maturité et de la capacité de vos développeurs, pas seulement de l'idéal sur le papier."
home.products.service.architecture.detail_new_label: Nouveau projet
home.products.service.architecture.detail_new: "Modélisation du domaine et choix techniques qui ne vous enfermeront pas à grande échelle, fondés sur des pratiques logicielles à l'état de l'art que votre équipe peut adopter à son rythme."
home.products.service.architecture.detail_existing_label: Code existant
home.products.service.architecture.detail_existing: "Votre produit a trouvé son marché ou est prêt pour son prochain chapitre. Nous le relisons ligne par ligne, faisons remonter des constats priorisés, et fournissons à votre équipe un plan séquencé pour le hisser aux standards modernes."
home.products.service.architecture.bullet_1: Architecture decision records
home.products.service.architecture.bullet_2: Revue de performance & scalabilité
home.products.service.architecture.bullet_3: Audit de sécurité & dépendances

home.products.service.coaching.title: Coaching à la carte
home.products.service.coaching.summary: "Du pair programming sur les problèmes difficiles, du déblocage de décisions, et la revue de la diff ouverte depuis une semaine. Nous nous branchons sur le rythme de votre équipe, votre Slack, vos stand-ups, votre dépôt, pas l'inverse."
home.products.service.coaching.detail: "Voyez cela comme un accès à la demande aux mainteneurs du core Symfony, celles et ceux qui façonnent l'évolution du framework et ont sûrement déjà rencontré exactement ce problème en amont. Pas d'engagement minimum : réservez une seule session ou gardez-nous au forfait, selon ce qui rend votre équipe plus rapide."
home.products.service.coaching.bullet_1: Sessions de brainstorming & de conception
home.products.service.coaching.bullet_2: Revues de code approfondies
home.products.service.coaching.bullet_3: Specs & rédaction technique

home.products.service.workshops_and_trainings.title: Ateliers & formations
home.products.service.workshops_and_trainings.summary: "Nous ne déroulons pas des slides devant votre équipe ; nous ouvrons votre dépôt et écrivons du code avec elle. Symfony, API Platform, les tests et le PHP moderne, enseignés sur des problèmes que vous rencontrez vraiment, pas des exemples de manuel."
home.products.service.workshops_and_trainings.detail: "Chaque session livre une vraie amélioration de votre code, si bien que la formation se rentabilise avant même l'arrivée de la facture. Plongées d'une demi-journée ou parcours sur plusieurs jours, sur site ou à distance, par groupes de trois ou de trente."
home.products.service.workshops_and_trainings.bullet_1: Symfony & API Platform
home.products.service.workshops_and_trainings.bullet_2: Stratégies de tests & de CI
home.products.service.workshops_and_trainings.bullet_3: PHP moderne & patterns

